name: Build Note

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish-build-note:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Generate Metrics
        id: metrics
        run: |
          # Ensure BuildDir exists for the .out files
          mkdir -p build
          # We use tail -n 1 to ensure we only get the JSON object
          JSON_OUTPUT=$(go run scripts/build.go metrics | tail -n 1)
          echo "json_note=$JSON_OUTPUT" >> $GITHUB_ENV

      - name: Publish build note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Fetch the existing notes from the remote
          # We use || true in case the ref doesn't exist yet (first run)
          git fetch origin refs/notes/build:refs/notes/build || true

          # 2. Write the note to a temp file
          printf 'Subject: Build Note for PR merge\n\n%s\n' "$json_note" > /tmp/build-note.txt

          # 3. Add the note to HEAD using the specific ref
          git notes --ref build add -F /tmp/build-note.txt HEAD

          # 4. Push the notes back to origin
          git push origin refs/notes/build
