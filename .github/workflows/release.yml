name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build release binaries
        run: go run scripts/build.go release

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            build/nekotree-linux-amd64 \
            build/nekotree-linux-amd64.sha256 \
            build/nekotree-darwin-amd64 \
            build/nekotree-darwin-amd64.sha256 \
            build/nekotree-darwin-arm64 \
            build/nekotree-darwin-arm64.sha256
