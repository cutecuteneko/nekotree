services:
  nekotree:
    build: .
    container_name: nekotree
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      # Mount the host workspace — nekotree will create worktrees inside this directory
      - ${WORKSPACE}:/workspace

      # Docker socket passthrough — allows nekotree to spin up sibling containers on the host
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WORKSPACE=${WORKSPACE}
