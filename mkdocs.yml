site_name: Nekotree API
docs_dir: build/docs
theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - go
    - yaml
    - bash
  static_templates:
    - 404.html

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Security Scan: security.md
  - Test Coverage: coverage.md
  - API Reference: 
      - Configuration: api/config.md
      - Docker Manager: api/docker.md
      - Git Worktrees: api/git.md
